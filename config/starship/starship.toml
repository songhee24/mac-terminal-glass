"$schema" = 'https://starship.rs/config-schema.json'

palette = 'goth'
add_newline = true

# Connected powerline bar — mono / dark goth (no near-black block)
format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
$time\
$line_break\
$character"""

[palettes.goth]
surface1 = '#23232d'
surface2 = '#31313d'
text     = '#c8c8d0'
subtext  = '#8a8a9c'
bone     = '#d6d6de'
ash      = '#6e6e7e'

[os]
disabled = false
format = '[ $symbol ](bg:surface2 fg:bone)'
[os.symbols]
Macos = ''

[username]
show_always = true
style_user = 'bg:surface2 fg:bone'
style_root = 'bg:surface2 fg:bone'
format = '[$user ](bg:surface2 fg:bone)[](fg:surface2 bg:surface1)'

[directory]
format = '[   $path ](bg:surface1 fg:text)[](fg:surface1 bg:surface2)'
truncation_length = 4
truncation_symbol = '…/'
truncate_to_repo = false
read_only = '  '
read_only_style = 'bg:surface1 fg:bone'

[git_branch]
symbol = ''
format = '[ $symbol $branch](bg:surface2 fg:bone)'

[git_status]
format = '[ $all_status$ahead_behind](bg:surface2 fg:bone)'
style = 'bg:surface2 fg:bone'

[time]
disabled = false
time_format = '%H:%M'
format = '[   $time ](bg:surface2 fg:subtext)[](fg:surface2)'

[character]
success_symbol = '[ ❯](bold fg:ash)'
error_symbol = '[ ❯](bold fg:bone)'
vimcmd_symbol = '[ ❮](bold fg:bone)'
